<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Chat UI</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial, sans-serif;
        }

        body {
          background: #e5ddd5;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .chat-container {
          width: 100%;
          max-width: 900px;
          height: 95vh;
          background: #efeae2;
          display: flex;
          flex-direction: column;
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .chat-header {
          background: #075e54;
          color: white;
          padding: 16px;
          font-size: 20px;
          font-weight: bold;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .chat-header .avatar {
          width: 42px;
          height: 42px;
          border-radius: 50%;
          background: white;
          color: #075e54;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
        }

        .chat-box {
          flex: 1;
          padding: 16px;
          overflow-y: auto;
          display: flex;
          flex-direction: column;
          gap: 12px;
          background: #ece5dd;
        }

        .message {
          max-width: 75%;
          padding: 12px 14px;
          border-radius: 12px;
          font-size: 15px;
          line-height: 1.4;
          word-wrap: break-word;
        }

        .user-message {
          background: #dcf8c6;
          align-self: flex-end;
          border-bottom-right-radius: 4px;
        }

        .bot-message {
          background: white;
          align-self: flex-start;
          border-bottom-left-radius: 4px;
        }

        .chat-input {
          display: flex;
          padding: 12px;
          background: #f0f0f0;
          gap: 10px;
        }

        .chat-input input {
          flex: 1;
          padding: 14px;
          border: none;
          border-radius: 10px;
          font-size: 15px;
          outline: none;
        }

        .chat-input button {
          background: #25d366;
          color: white;
          border: none;
          padding: 0 24px;
          border-radius: 10px;
          font-size: 15px;
          cursor: pointer;
          font-weight: bold;
        }

        .chat-input button:hover {
          background: #1ebe5d;
        }

        @media (max-width: 768px) {
          body {
            align-items: stretch;
          }

          .chat-container {
            max-width: 100%;
            height: 100vh;
            border-radius: 0;
          }

          .message {
            max-width: 85%;
          }

          .chat-header {
            font-size: 18px;
          }

          .chat-input button {
            padding: 0 18px;
          }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">B</div>
        Chat Bot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot-message">Hello 👋 How can I help you today?</div>
    </div>

    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');

    async function sendMessage() {
      const message = messageInput.value.trim();

      if (!message) return;

      appendMessage(message, 'user-message');
      messageInput.value = '';

      try {
        const response = await fetch('https://whatsapp-chatbot-4mox.onrender.com/webhook', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            sender: 'Shivam',
            message: message
          })
        });

        const data = await response.json();
        appendMessage(data.reply || 'No response from bot', 'bot-message');
      } catch (error) {
        appendMessage('Server connection error', 'bot-message');
        console.error(error);
      }
    }

    function appendMessage(text, className) {
      const div = document.createElement('div');
      div.classList.add('message', className);
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    messageInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
</script>

</body>
</html>
